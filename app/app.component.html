<div class="min-h-screen font-sans text-gray-800 dark:text-gray-200">

  @if (currentUser()) {

    <div class="flex flex-col md:flex-row min-h-screen bg-gray-100 dark:bg-gray-900">

      <!-- Sidebar only for desktop -->
      @if (isAdmin()) {
        <div class="hidden md:block">
          <app-sidebar (logout)="logout()"></app-sidebar>
        </div>
      }

      <div class="flex-1 flex flex-col">

        <!-- Header always visible -->
        <app-header (logout)="logout()"></app-header>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 overflow-y-auto p-4">

          <!-- MOBILE APP LOOK CONTAINER -->
          <div class="max-w-[480px] w-full mx-auto">
            <router-outlet></router-outlet>
          </div>

        </main>
      </div>
    </div>

  } @else {
    
    <!-- NON LOGIN pages -->
    <div class="max-w-[480px] w-full mx-auto p-4">
      <router-outlet></router-outlet>
    </div>
    
  }

</div>
